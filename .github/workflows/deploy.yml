name: CloudOps CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Move to backend
        run: cd backend

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Build Docker image
        run: |
          cd backend
          docker build -t cloudops-app .

      - name: Run container
        run: |
          cd backend
          docker run -d -p 5000:5000 cloudops-app