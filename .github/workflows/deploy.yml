name: CloudOps CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo structure
        run: ls -R

      - name: Install dependencies (backend)
        run: |
          cd backend
          npm install

      - name: Build Docker image
        run: |
          cd backend
          docker build -t cloudops-app .

      - name: Run container
        run: |
          cd backend
          docker run -d -p 5000:5000 cloudops-app